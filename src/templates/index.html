<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Galerie - Akwarium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Apple Color Emoji', 'Noto Color Emoji', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .gallery-item {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .gallery-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
    .gallery-item a {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 25px 15px;
      min-height: 220px;
    }
    .folder-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin-bottom: 8px;
      display: block;
      line-height: 1;
    }
    .folder-label {
      font-size: 0.7rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .date {
      font-size: 1.3rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      margin-top: 3px;
    }
    .day {
      font-size: 0.9rem;
      color: #999;
      text-transform: capitalize;
      margin-bottom: 8px;
    }
    .photos {
      font-size: 0.85rem;
      color: #666;
      background: #f0f0f0;
      padding: 6px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }
    footer {
      text-align: center;
      color: white;
      font-size: 0.9rem;
      margin-top: 40px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Galerie Akwarium</h1>
    <div class="gallery-grid">
      {% for folder in folders %}
      <div class="gallery-item">
        <a href="{{ folder.name }}">
          <img src="{{ url_for('static', filename='folder.png') }}" class="folder-icon" alt="folder icon">
          <div class="date">{{ folder.label }}</div>
          <div class="day">{{ folder.day_name }}</div>
          <div class="photos">{{ folder.file_count }} zdjęć</div>
        </a>
      </div>
      {% endfor %}
    </div>
    <footer>
      <p>Łącznie {{ folders|count }} galerii | Ostatnia aktualizacja: {{ folders[0].label }}</p>
    </footer>
  </div>
</body>
</html>
